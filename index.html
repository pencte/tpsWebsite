<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<title>TerorismePS</title>

<style>
:root{
  --bg:#07090d;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --accent:#7c9cff;
  --text:#f1f5ff;
  --sub:#8c92a4;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:var(--text);
  background:#07090d;
  overflow-x:hidden;
}

/* PARALLAX BG */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 20%,rgba(124,156,255,0.15),transparent),
             radial-gradient(circle at 80% 80%,rgba(124,156,255,0.1),transparent);
  z-index:-2;
  transition:.1s;
}

/* NAVBAR GLASS */
header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(12px);
  background:rgba(10,12,18,0.4);
  border-bottom:1px solid var(--border);
  transition:.3s;
}

header.scrolled{
  background:rgba(10,12,18,0.8);
}

/* NAV */
nav a{
  margin-left:20px;
  color:var(--sub);
  cursor:pointer;
  position:relative;
}

nav a.active::after{
  content:"";
  position:absolute;
  bottom:-6px;
  width:100%;
  height:2px;
  background:var(--accent);
}

/* TAB */
.tab{
  display:none;
  opacity:0;
  transform:translateY(30px) scale(.98);
  transition:.5s;
  padding:60px 20px;
}
.tab.active{
  display:block;
  opacity:1;
  transform:translateY(0) scale(1);
}

/* HERO */
.hero{text-align:center}

/* BUTTON MAGNET */
.btn{
  margin-top:20px;
  padding:12px 24px;
  border-radius:999px;
  border:none;
  background:linear-gradient(135deg,#7c9cff,#9bb1ff);
  color:white;
  cursor:pointer;
  transition:.2s;
  position:relative;
}

/* GRID */
.grid{
  margin-top:40px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  position:relative;
  overflow:hidden;
}

/* CARD LIGHT */
.card::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle,rgba(124,156,255,0.15),transparent);
  top:var(--y,50%);
  left:var(--x,50%);
  transform:translate(-50%,-50%);
  opacity:0;
  transition:.3s;
}

.card:hover::before{
  opacity:1;
}

/* STATUS */
.status{color:var(--sub)}

footer{
  text-align:center;
  padding:30px;
  color:var(--sub);
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<header id="nav">
  <div>TerorismePS</div>
  <nav>
    <a class="active" onclick="tab(event,'home')">Home</a>
    <a onclick="tab(event,'how')">How</a>
    <a onclick="tab(event,'community')">Community</a>
    <a onclick="tab(event,'download')">Download</a>
    <a onclick="tab(event,'rules')">Rules</a>
  </nav>
</header>

<!-- HOME -->
<div class="tab active" id="home">
  <div class="hero">
    <h1>Terorisme Private Server</h1>
    <p>Smooth & modern experience</p>
    <button class="btn" id="play">Play Now</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Status</h3>
      <div class="status" id="status">0 Players</div>
    </div>

    <div class="card">
      <h3>Performance</h3>
      <div class="status">Stable • Low latency</div>
    </div>
  </div>
</div>

<footer>© TerorismePS</footer>

<script>

/* TAB */
function tab(e,id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}

/* SMOOTH COUNTER */
let count=0;
setInterval(()=>{
  let target=Math.floor(Math.random()*150);
  let interval=setInterval(()=>{
    if(count<target) count++;
    else clearInterval(interval);
    document.getElementById("status").innerText="Online • "+count+" players";
  },20);
},3000);

/* PARALLAX */
document.addEventListener("mousemove",e=>{
  let x=e.clientX/50;
  let y=e.clientY/50;
  document.getElementById("bg").style.transform=`translate(${x}px,${y}px)`;
});

/* NAV SCROLL */
window.addEventListener("scroll",()=>{
  if(window.scrollY>10) nav.classList.add("scrolled");
  else nav.classList.remove("scrolled");
});

/* CARD LIGHT FOLLOW */
document.querySelectorAll(".card").forEach(card=>{
  card.addEventListener("mousemove",e=>{
    let rect=card.getBoundingClientRect();
    card.style.setProperty('--x', e.clientX-rect.left+'px');
    card.style.setProperty('--y', e.clientY-rect.top+'px');
  });
});

/* MAGNET BUTTON */
const btn=document.getElementById("play");
btn.addEventListener("mousemove",e=>{
  const rect=btn.getBoundingClientRect();
  const x=e.clientX-rect.left-rect.width/2;
  const y=e.clientY-rect.top-rect.height/2;
  btn.style.transform=`translate(${x*0.2}px,${y*0.2}px)`;
});
btn.addEventListener("mouseleave",()=>{
  btn.style.transform="translate(0,0)";
});

</script>

</body>
</html>
