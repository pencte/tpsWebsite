<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terorisme Private Server (TPS)</title>

<style>
:root {
  --red: #ff3b3b;
  --green: #00ff9d;
  --blue: #00bfff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #000000, #2a0000, #002a1a, #001a2a);
  background-size: 400% 400%;
  animation: bgMove 12s infinite alternate;
  color: #fff;
  text-align: center;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* TAB */
.tab-content {
  display: none;
  opacity: 0;
  transform: translateY(20px);
  transition: .4s;
}
.tab-content.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* HEADER */
header {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 30px;
}

/* NAV */
nav a {
  color: #ccc;
  margin: 0 12px;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
  transition: .3s;
}

nav a:hover {
  color: var(--green);
}

nav a.active {
  color: white;
  border-bottom: 2px solid var(--green);
}

/* LOGO */
.logo {
  width: 260px;
  border-radius: 16px;
  margin: 15px 0;
  box-shadow: 0 0 30px rgba(0,255,157,0.4);
}

/* BUTTON */
.button {
  display: inline-block;
  margin: 8px;
  padding: 12px 26px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--red), var(--blue));
  color: white;
  font-weight: bold;
  text-decoration: none;
  box-shadow: 0 0 15px rgba(0,255,157,0.3);
  transition: .3s;
}

.button:hover {
  transform: scale(1.1);
  box-shadow: 0 0 25px var(--green);
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 25px;
  max-width: 900px;
  margin: auto;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

pre {
  background: rgba(0,0,0,0.4);
  padding: 15px;
  border-radius: 12px;
  color: var(--green);
}

/* FOOTER */
footer {
  margin-top: 40px;
  padding: 15px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <img src="gtfs.jpg" class="logo">
  <h1>Growtopia Fiki Server</h1>

  <nav>
    <a class="active" onclick="openTab(event,'home')">Beranda</a>
    <a onclick="openTab(event,'how')">Cara Bermain</a>
    <a onclick="openTab(event,'community')">Komunitas</a>
    <a onclick="openTab(event,'download')">Download</a>
    <a onclick="openTab(event,'rules')">Peraturan</a>
  </nav>
</header>

<!-- HOME -->
<div class="container tab-content active" id="home">
  <h2>Selamat Datang di GTFS 🔥</h2>
  <p>Server gratis, stabil, dan ringan.</p>
</div>

<!-- HOW -->
<div class="container tab-content" id="how">
  <div class="card">
    <h2>Cara Bermain</h2>
<pre>
103.59.161.68 growtopia1.com
103.59.161.68 growtopia2.com
</pre>
  </div>
</div>

<!-- COMMUNITY -->
<div class="container tab-content" id="community">
  <h2>Komunitas</h2>
  <a class="button">WhatsApp</a>
  <a class="button">Discord</a>
</div>

<!-- DOWNLOAD -->
<div class="container tab-content" id="download">
  <h2>Download</h2>
  <a class="button">APK</a>
</div>

<!-- RULES -->
<div class="container tab-content" id="rules">
  <h2>Peraturan Server</h2>
</div>

<footer>
  © 2022 TerorismePS Server
</footer>

<script>
function openTab(evt, tabId) {
  document.querySelectorAll(".tab-content").forEach(el => {
    el.classList.remove("active");
  });

  document.querySelectorAll("nav a").forEach(a => {
    a.classList.remove("active");
  });

  document.getElementById(tabId).classList.add("active");
  evt.target.classList.add("active");
}
</script>

</body>
</html>
