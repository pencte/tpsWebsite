<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TerorismePS System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL STYLE
========================= */
:root{
--bg:#0b0d12;
--sidebar:#12151c;
--topbar:#0f1117;
--card:#161a22;
--accent:#6c8cff;
--green:#00d084;
--red:#ff4d4d;
--text:#eaeefb;
--sub:#8b90a0;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
height:100vh;
overflow:hidden;
}

/* =========================
   SIDEBAR
========================= */
.sidebar{
width:240px;
background:var(--sidebar);
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:18px;
font-weight:600;
margin-bottom:30px;
}

.menu{
flex:1;
}

.menu-item{
padding:12px;
margin:6px 0;
border-radius:10px;
cursor:pointer;
color:var(--sub);
transition:.2s;
}

.menu-item:hover,
.menu-item.active{
background:rgba(108,140,255,.1);
color:white;
}

/* =========================
   MAIN LAYOUT
========================= */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOPBAR */
.topbar{
height:60px;
background:var(--topbar);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid rgba(255,255,255,.05);
}

/* CONTENT */
.content{
flex:1;
overflow:auto;
padding:20px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CARD */
.card{
background:var(--card);
padding:20px;
border-radius:14px;
transition:.2s;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-4px);
}

/* =========================
   BUTTON
========================= */
.btn{
padding:10px 18px;
background:var(--accent);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin:5px 0;
}

.btn.red{background:var(--red);}
.btn.green{background:var(--green);}

/* =========================
   INPUT
========================= */
input{
width:100%;
padding:10px;
border-radius:8px;
border:none;
background:#0f1117;
color:white;
margin:6px 0;
}

/* =========================
   TABLE
========================= */
table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.05);
}

/* =========================
   LOG PANEL
========================= */
.log{
height:200px;
overflow:auto;
font-size:12px;
background:#0f1117;
padding:10px;
border-radius:10px;
}

/* =========================
   HIDDEN
========================= */
.hidden{display:none}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">TerorismePS</div>

  <div class="menu">
    <div class="menu-item active" onclick="navigate('home')">🏠 Dashboard</div>
    <div class="menu-item" onclick="navigate('launcher')">🎮 Launcher</div>
    <div class="menu-item" onclick="navigate('players')">👤 Players</div>
    <div class="menu-item" onclick="navigate('logs')">📜 Logs</div>
    <div class="menu-item" onclick="navigate('admin')">⚙️ Admin</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>System Panel</div>
    <div id="time"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DASHBOARD -->
    <div id="home">
      <div class="grid">

        <div class="card">
          <h3>Server Status</h3>
          <p id="status">Online</p>
        </div>

        <div class="card">
          <h3>Total Player</h3>
          <p id="playerCount">0</p>
        </div>

        <div class="card">
          <h3>Uptime</h3>
          <p id="uptime">0 min</p>
        </div>

      </div>
    </div>

    <!-- LAUNCHER -->
    <div id="launcher" class="hidden">
      <div class="card">
        <h2>Game Launcher</h2>
        <button class="btn green" onclick="log('Game launched')">Play</button>
        <button class="btn">Update</button>
      </div>
    </div>

    <!-- PLAYERS -->
    <div id="players" class="hidden">
      <div class="card">
        <h3>Player List</h3>
        <table>
          <thead>
            <tr><th>Name</th><th>Status</th></tr>
          </thead>
          <tbody id="playerTable"></tbody>
        </table>
      </div>
    </div>

    <!-- LOGS -->
    <div id="logs" class="hidden">
      <div class="card">
        <h3>Server Logs</h3>
        <div class="log" id="logBox"></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="hidden">
      <div class="card">
        <h3>Admin Control</h3>
        <input placeholder="Command..." id="cmd">
        <button class="btn" onclick="sendCommand()">Execute</button>
        <button class="btn red" onclick="kickAll()">Kick All</button>
      </div>
    </div>

  </div>
</div>

<script>

/* =========================
   NAVIGATION
========================= */
function navigate(id){
document.querySelectorAll(".content > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".menu-item").forEach(m=>m.classList.remove("active"));
event.target.classList.add("active");
}

/* =========================
   TIME
========================= */
setInterval(()=>{
document.getElementById("time").innerText=new Date().toLocaleTimeString();
},1000);

/* =========================
   FAKE API
========================= */
let players=[];
function generatePlayers(){
players=[];
for(let i=0;i<10;i++){
players.push({name:"Player"+i,status:"Online"});
}
updateTable();
}
generatePlayers();

function updateTable(){
let html="";
players.forEach(p=>{
html+=`<tr><td>${p.name}</td><td>${p.status}</td></tr>`;
});
document.getElementById("playerTable").innerHTML=html;
}

/* =========================
   STATUS LOOP
========================= */
setInterval(()=>{
let count=Math.floor(Math.random()*200);
document.getElementById("playerCount").innerText=count;
document.getElementById("uptime").innerText=Math.floor(Math.random()*999)+" min";
},2000);

/* =========================
   LOG SYSTEM
========================= */
function log(msg){
let box=document.getElementById("logBox");
box.innerHTML+="<div>> "+msg+"</div>";
box.scrollTop=box.scrollHeight;
}

setInterval(()=>{
log("Ping server...");
},3000);

/* =========================
   ADMIN ACTION
========================= */
function sendCommand(){
let cmd=document.getElementById("cmd").value;
log("Execute: "+cmd);
}

function kickAll(){
log("All players kicked");
players=[];
updateTable();
}

</script>

</body>
</html>
