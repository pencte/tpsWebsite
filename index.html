<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTFS ULTRA LAUNCHER</title>

<style>
:root{
--r:#ff3b3b;
--g:#00ff9d;
--b:#00bfff;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Consolas;
background:#000;
color:#0f0;
overflow:hidden;
}

/* RGB BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg,#000,#1a0000,#001a0f,#001a2a);
background-size:400% 400%;
animation:bg 10s infinite alternate;
z-index:-2;
}
@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

/* GLITCH TITLE */
.glitch{
font-size:40px;
text-align:center;
margin-top:20px;
animation:glitch 1s infinite;
}
@keyframes glitch{
0%{text-shadow:2px 0 red,-2px 0 blue;}
50%{text-shadow:-2px 0 red,2px 0 blue;}
100%{text-shadow:2px 0 red,-2px 0 blue;}
}

/* NAV */
nav{
text-align:center;
margin:20px;
}
nav a{
margin:0 10px;
cursor:pointer;
color:#0f0;
}
nav a.active{
color:#fff;
border-bottom:2px solid #0f0;
}

/* TAB */
.tab{
display:none;
padding:20px;
text-align:center;
}
.tab.active{
display:block;
animation:fade .5s;
}
@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1}
}

/* CARD */
.card{
background:rgba(0,0,0,.7);
padding:20px;
border:1px solid #0f0;
max-width:800px;
margin:auto;
}

/* BUTTON */
.btn{
padding:10px 20px;
background:black;
border:1px solid #0f0;
color:#0f0;
cursor:pointer;
margin:5px;
}
.btn:hover{
background:#0f0;
color:#000;
}

/* TERMINAL */
#terminal{
position:fixed;
bottom:0;
left:0;
width:100%;
height:200px;
background:#000;
overflow:auto;
font-size:12px;
padding:10px;
border-top:1px solid #0f0;
}

/* LOADING */
#loading{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
flex-direction:column;
}

/* PARTICLE */
canvas{
position:fixed;
top:0;
z-index:-1;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">
<h2>BOOTING SYSTEM...</h2>
</div>

<canvas id="c"></canvas>

<h1 class="glitch">GTFS ULTRA LAUNCHER</h1>

<nav>
<a class="active" onclick="tab(event,'home')">HOME</a>
<a onclick="tab(event,'how')">HOW</a>
<a onclick="tab(event,'community')">COMMUNITY</a>
<a onclick="tab(event,'download')">DOWNLOAD</a>
<a onclick="tab(event,'rules')">RULES</a>
</nav>

<div class="tab active" id="home">
<div class="card">
<h2>SERVER ONLINE</h2>
<p id="status">Checking...</p>
<button class="btn" onclick="playMusic()">PLAY MUSIC</button>
</div>
</div>

<div class="tab" id="how">
<div class="card">
<pre>103.59.161.68 growtopia1.com</pre>
</div>
</div>

<div class="tab" id="community">
<div class="card">
<button class="btn">WhatsApp</button>
<button class="btn">Discord</button>
</div>
</div>

<div class="tab" id="download">
<div class="card">
<button class="btn">DOWNLOAD APK</button>
</div>
</div>

<div class="tab" id="rules">
<div class="card">
<p>NO CHEAT / NO SPAM</p>
</div>
</div>

<!-- TERMINAL -->
<div id="terminal"></div>

<script>

/* LOADING */
setTimeout(()=>loading.style.display="none",1500);

/* TAB */
function tab(e,id){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));
document.getElementById(id).classList.add("active");
e.target.classList.add("active");
sound();
log("Switching to "+id);
}

/* SOUND */
function sound(){
new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3").play();
}

/* MUSIC */
let music;
function playMusic(){
music=new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
music.loop=true;
music.play();
}

/* TERMINAL LOG */
function log(t){
const term=document.getElementById("terminal");
term.innerHTML+="<div>> "+t+"</div>";
term.scrollTop=term.scrollHeight;
}

/* FAKE STATUS */
setInterval(()=>{
document.getElementById("status").innerText="ONLINE - "+Math.floor(Math.random()*200)+" PLAYERS";
},2000);

/* PARTICLE */
const c=document.getElementById("c");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let p=[];
for(let i=0;i<100;i++){
p.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
ctx.clearRect(0,0,c.width,c.height);
p.forEach(pt=>{
ctx.fillStyle="#0f0";
ctx.fillRect(pt.x,pt.y,2,2);
pt.y+=1;
if(pt.y>c.height)pt.y=0;
});
}
setInterval(draw,30);

</script>

</body>
</html>
