<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTFS Server</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

.container {
  padding:60px 20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  max-width:600px;
  margin:auto;
}

.online { color:#00ff9d; }
.offline { color:red; }
</style>
</head>

<body>

<canvas id="particles"></canvas>

<h1>GTFS Server</h1>

<div class="container">
  <div class="card">
    <h2>Server Status</h2>
    Status: <span id="status">Loading...</span><br><br>
    Player: <span id="players">0</span>
  </div>
</div>

<script>
async function getStatus() {
  try {
    const res = await fetch("/api/status");
    const data = await res.json();

    const s = document.getElementById("status");
    const p = document.getElementById("players");

    s.textContent = data.status;
    p.textContent = data.players;

    s.className = data.status === "online" ? "online" : "offline";

  } catch {
    document.getElementById("status").textContent = "ERROR";
  }
}

setInterval(getStatus, 5000);
getStatus();

/* PARTICLE */
const c = document.getElementById("particles");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let arr = [];
for(let i=0;i<50;i++){
  arr.push({x:Math.random()*c.width,y:Math.random()*c.height});
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  arr.forEach(a=>{
    ctx.fillRect(a.x,a.y,2,2);
    a.y+=0.5;
    if(a.y>c.height) a.y=0;
  });
}

setInterval(draw,30);
</script>

</body>
</html>
