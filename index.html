<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTFS Launcher</title>

<style>
:root{
  --bg:#0f1115;
  --card:#1a1d24;
  --accent:#4f8cff;
  --text:#e6e6e6;
  --sub:#9aa0a6;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter,Segoe UI,Arial;
  background:linear-gradient(180deg,#0f1115,#0a0c10);
  color:var(--text);
}

/* HEADER */
header{
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

h1{
  margin:0;
  font-size:20px;
}

/* NAV */
nav a{
  margin-left:20px;
  text-decoration:none;
  color:var(--sub);
  cursor:pointer;
  transition:.2s;
}

nav a:hover{
  color:white;
}

nav a.active{
  color:white;
  border-bottom:2px solid var(--accent);
  padding-bottom:4px;
}

/* TAB */
.tab{
  display:none;
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
  padding:40px;
}

.tab.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* CARD */
.card{
  background:var(--card);
  border-radius:16px;
  padding:25px;
  max-width:900px;
  margin:auto;
  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

/* BUTTON */
.btn{
  padding:12px 20px;
  border-radius:10px;
  background:var(--accent);
  color:white;
  border:none;
  cursor:pointer;
  margin:5px;
  transition:.2s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 15px rgba(79,140,255,.3);
}

/* STATUS */
.status{
  margin-top:10px;
  color:var(--sub);
}

/* GRID HOME */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.box{
  background:var(--card);
  padding:20px;
  border-radius:12px;
}

/* MOBILE */
@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
  <h1>GTFS Launcher</h1>

  <nav>
    <a class="active" onclick="tab(event,'home')">Home</a>
    <a onclick="tab(event,'how')">How</a>
    <a onclick="tab(event,'community')">Community</a>
    <a onclick="tab(event,'download')">Download</a>
    <a onclick="tab(event,'rules')">Rules</a>
  </nav>
</header>

<!-- HOME -->
<div class="tab active" id="home">
  <div class="grid">

    <div class="box">
      <h3>Status Server</h3>
      <div class="status" id="status">Checking...</div>
    </div>

    <div class="box">
      <h3>Quick Actions</h3>
      <button class="btn">Play</button>
      <button class="btn">Download</button>
    </div>

  </div>
</div>

<!-- HOW -->
<div class="tab" id="how">
  <div class="card">
<pre>
103.59.161.68 growtopia1.com
103.59.161.68 growtopia2.com
</pre>
  </div>
</div>

<!-- COMMUNITY -->
<div class="tab" id="community">
  <div class="card">
    <button class="btn">WhatsApp</button>
    <button class="btn">Discord</button>
  </div>
</div>

<!-- DOWNLOAD -->
<div class="tab" id="download">
  <div class="card">
    <button class="btn">Download APK</button>
  </div>
</div>

<!-- RULES -->
<div class="tab" id="rules">
  <div class="card">
    <p>No cheat, no spam.</p>
  </div>
</div>

<script>

/* TAB */
function tab(e,id){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll("nav a").forEach(a=>a.classList.remove("active"));

  document.getElementById(id).classList.add("active");
  e.target.classList.add("active");
}

/* STATUS SIMPEL */
setInterval(()=>{
  document.getElementById("status").innerText =
    "Online • "+Math.floor(Math.random()*150)+" players";
},2000);

</script>

</body>
</html>
