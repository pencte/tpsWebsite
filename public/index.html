<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerorismePS</title>

<style>
:root {
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #111;
  --soft: #f0f0f0;
}

.dark {
  --bg: #0f1115;
  --card: #161b22;
  --text: #e6edf3;
  --soft: #21262d;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial;
  display: flex;
  justify-content: center;
  margin-top: 50px;
  transition: 0.3s;
}

/* ☰ MENU */
.menu-btn {
  position: fixed;
  top: 10px;
  right: 15px;
  font-size: 20px;
  cursor: pointer;
  background: var(--card);
  padding: 6px 10px;
  border-radius: 8px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  z-index: 999;
}

/* CARD */
.card {
  background: var(--card);
  width: 400px;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  position: relative;
}

/* STATUS BOX */
.status-box {
  width: 15px;
  height: 15px;
  border-radius: 4px;
  position: absolute;
  top: 15px;
  left: 15px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

/* STATUS TEXT */
.status-text {
  text-align: center;
  font-size: 13px;
  margin-bottom: 10px;
}

/* BANNER */
.banner {
  width: 100%;
  height: 130px;
  border-radius: 15px;
  background: url('/banner.png') center/cover no-repeat;
}

/* ROW */
.row {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

/* BUTTON */
.join-btn {
  background: var(--soft);
  padding: 10px 15px;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.join-btn:hover {
  opacity: 0.8;
}

/* ONLINE */
.online-box {
  background: var(--soft);
  padding: 10px 15px;
  border-radius: 10px;
}

/* STATS */
.stats {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
  background: var(--soft);
  padding: 10px;
  border-radius: 10px;
}

.stat {
  text-align: center;
  font-size: 12px;
}

/* TOGGLE */
.toggle {
  position: absolute;
  top: 15px;
  right: 15px;
  cursor: pointer;
  font-size: 12px;
}

/* OWNER PANEL */
.owner-panel {
  margin-top: 15px;
  background: var(--soft);
  padding: 10px;
  border-radius: 10px;
  display: none;
}

/* ========================= */
/* PREVIEW (DITAMBAH)        */
/* ========================= */
.preview {
  margin-top:15px;
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.preview img{
  width:160px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
  flex-shrink:0;
}

/* ========================= */
/* MOBILE FIX (DITAMBAH)     */
/* ========================= */
@media(max-width:500px){
  .card{
    width:95%;
  }

  .row{
    flex-direction:column;
    gap:10px;
  }

  .stats{
    flex-direction:row;
  }
}
</style>
</head>

<body>

<div class="menu-btn" onclick="openOwner()">☰</div>

<div class="card">

  <div id="statusBox" class="status-box"></div>

  <div class="toggle" onclick="toggleMode()">🌓</div>

  <div class="title">TerorismePS</div>
  <div id="statusText" class="status-text">-</div>

  <div class="banner"></div>

  <div class="row">
    <div class="join-btn" onclick="join()">JOIN SERVER</div>
    <div class="online-box"><span id="players">0</span> online</div>
  </div>

  <div class="stats">
    <div class="stat">🌍<br><span id="worlds">0</span><br>Worlds</div>
    <div class="stat">👤<br><span id="accounts">0</span><br>Accounts</div>
    <div class="stat">🛡<br><span id="guilds">0</span><br>Guilds</div>
  </div>

  <!-- PREVIEW -->
  <div class="preview" id="preview">
    <img src="/preview/1.jpg">
    <img src="/preview/2.jpg">
    <img src="/preview/3.jpg">
    <img src="/preview/4.jpg">
    <img src="/preview/5.jpg">
  </div>

  <!-- OWNER PANEL -->
  <div id="ownerPanel" class="owner-panel">
    <div class="stats">
      <div class="stat">⚡<br><span id="cpu">0</span><br>CPU</div>
      <div class="stat">🧠<br><span id="ram">0</span><br>RAM</div>
    </div>
  </div>

</div>

<script>
// JOIN
function join() {
  window.open("https://chat.whatsapp.com/DpHWmAOsvi16FNxbmwIP7u?mode=gi_t", "_blank");
}

// DARK MODE
function toggleMode() {
  document.body.classList.toggle("dark");
}

// OWNER MENU
function openOwner() {
  const pass = prompt("Owner password:");
  if (pass === "admin123") {
    document.getElementById("ownerPanel").style.display = "block";
    loadOwner();
  } else {
    alert("Wrong password");
  }
}

// LOAD OWNER DATA
async function loadOwner() {
  const res = await fetch("/api/status");
  const data = await res.json();

  document.getElementById("cpu").innerText = data.cpu + "%";
  document.getElementById("ram").innerText = data.ram.used + " GB";
}

// LOAD DATA
async function load() {
  const res = await fetch("/api/status");
  const data = await res.json();

  const box = document.getElementById("statusBox");
  const text = document.getElementById("statusText");

  if (data.status === "online") {
    box.style.background = "#3fb950";
    text.innerText = "SERVER ONLINE";
  } else {
    box.style.background = "#f85149";
    text.innerText = "SERVER OFFLINE";
  }

  document.getElementById("players").innerText = data.players;
  document.getElementById("worlds").innerText = data.worlds || 0;
  document.getElementById("accounts").innerText = data.accounts || 0;
  document.getElementById("guilds").innerText = data.guilds || 0;
}

setInterval(load, 3000);
load();

/* AUTO SLIDE PREVIEW (DITAMBAH) */
const preview=document.getElementById("preview");
if(preview){
  let i=0;
  setInterval(()=>{
    i++;
    if(i>=preview.children.length) i=0;
    preview.scrollTo({
      left:preview.children[i].offsetLeft,
      behavior:"smooth"
    });
  },3000);
}
</script>

</body>
</html>
