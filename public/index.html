<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerorismePS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div id="toast"></div>

<div class="sidebar">
  <h2>TerorismePS</h2>

  <div class="menu active" onclick="show('home')">Dashboard</div>
  <div class="menu" onclick="show('how')">How To Play</div>
  <div class="menu" onclick="show('rules')">Rules</div>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="home" class="page">
  <div class="card big">
    <h1>Welcome to TerorismePS</h1>
    <p>Private server Growtopia Indonesia</p>
    <button class="play">PLAY</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Status</h3>
      <p id="status">Checking...</p>
    </div>

    <div class="card">
      <h3>Players</h3>
      <p id="players">0</p>
    </div>
  </div>

  <!-- TAMBAHAN: SERVER PREVIEW -->
  <div class="card">
    <h3>Server Preview</h3>
    <div class="preview-container" id="preview">
      <img src="/preview/1.jpg">
      <img src="/preview/2.jpg">
      <img src="/preview/3.jpg">
      <img src="/preview/4.jpg">
      <img src="/preview/5.jpg">
    </div>
  </div>

</div>

<!-- HOW -->
<div id="how" class="page hidden">
  <div class="card">
    <h2>How To Play</h2>

    <div class="tabs">
      <button onclick="showHow('android')" class="tab active">Android</button>
      <button onclick="showHow('windows')" class="tab">Windows</button>
      <button onclick="showHow('ios')" class="tab">iOS</button>
    </div>

    <div id="android" class="howContent">
      <div class="actions">
        <button onclick="copyText()">Copy PTunnel URL</button>
        <button onclick="downloadFile('/raw/terorismeps','host.txt')">Download Host</button>
        <button onclick="downloadFile('/files/powertunnel.apk','powertunnel.apk')">Download PowerTunnel</button>
      </div>
    </div>

    <div id="windows" class="howContent hidden">
      <div class="actions">
        <button onclick="downloadFile('/raw/terorismeps','host.txt')">Download Host</button>
      </div>
    </div>

    <div id="ios" class="howContent hidden">
      <div class="actions">
        <button onclick="copyText()">Copy Surge URL</button>
      </div>
    </div>

  </div>
</div>

<!-- RULES -->
<div id="rules" class="page hidden">
  <div class="card">
    <h2>Rules</h2>
    <ul>
      <li>No spam</li>
      <li>No cheat</li>
      <li>Be respectful</li>
    </ul>
  </div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
