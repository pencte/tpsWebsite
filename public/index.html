<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerorismePS</title>
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="bg"></div>
<div id="toast"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>TerorismePS</h2>

  <div class="menu active" onclick="show('home', this)">
    Dashboard <span class="indicator"></span>
  </div>

  <div class="menu" onclick="show('how', this)">
    How To Play <span class="indicator"></span>
  </div>

  <div class="menu" onclick="show('rules', this)">
    Rules <span class="indicator"></span>
  </div>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="home" class="page">
  <div class="card big">
    <h1>Welcome to TerorismePS</h1>
    <p>Private server Growtopia Indonesia</p>
    <button class="play ripple">PLAY</button>
  </div>

  <div class="grid">
    <div class="card stat">
      <h3>Status</h3>
      <p id="status">Checking...</p>
    </div>

    <div class="card stat">
      <h3>Players</h3>
      <p id="players">0</p>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="card">
    <h3>Server Preview</h3>

    <div class="preview-wrapper">
      <div class="preview-container" id="preview">
        <img src="/preview/1.jpg">
        <img src="/preview/2.jpg">
        <img src="/preview/3.jpg">
        <img src="/preview/4.jpg">
        <img src="/preview/5.jpg">
        <img src="/preview/6.jpg">
      </div>
      <div class="dots" id="dots"></div>
    </div>

  </div>

</div>

<!-- HOW -->
<div id="how" class="page hidden">
  <div class="card">
    <h2>How To Play</h2>

    <div class="tabs">
      <button class="tab active" onclick="showHow('android', this)">Android</button>
      <button class="tab" onclick="showHow('windows', this)">Windows</button>
      <button class="tab" onclick="showHow('ios', this)">iOS</button>
    </div>

    <div id="android" class="howContent">
      <div class="actions">
        <button class="ripple" onclick="copyText(this)">Copy PTunnel URL</button>
        <button class="ripple" onclick="downloadFile('/raw/terorismeps','host.txt', this)">Download Host</button>
        <button class="ripple" onclick="downloadFile('/powertunnel.apk','powertunnel.apk', this)">Download PowerTunnel</button>
      </div>
<pre>Android steps...</pre>
    </div>

    <div id="windows" class="howContent hidden">
      <div class="actions">
        <button class="ripple" onclick="downloadFile('/raw/terorismeps','host.txt', this)">Download Host</button>
      </div>
<pre>Windows steps...</pre>
    </div>

    <div id="ios" class="howContent hidden">
      <div class="actions">
        <button class="ripple" onclick="copyText(this)">Copy Surge URL</button>
      </div>
<pre>iOS steps...</pre>
    </div>

  </div>
</div>

<!-- RULES -->
<div id="rules" class="page hidden">
  <div class="card">
    <h2>Rules</h2>
    <ul>
      <li>No spam</li>
      <li>No cheat</li>
      <li>Be respectful</li>
    </ul>
  </div>
</div>

</div>

<script src="/app.js"></script>

  <div class="bottom-nav">
  <div onclick="show('home', this)" class="nav-item active">🏠</div>
  <div onclick="show('how', this)" class="nav-item">🎮</div>
  <div onclick="show('rules', this)" class="nav-item">📜</div>
</div>
  
</body>
</html>
